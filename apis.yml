name: YRC Worldwide
description: >-
  YRC Worldwide (rebranded as Yellow Corporation in 2021) was a holding company
  whose subsidiaries — YRC Freight, Holland, Reddaway, New Penn, and HNRY
  Logistics — provided less-than-truckload (LTL) freight transportation,
  brokerage, and logistics services across North America. The company ceased
  operations on July 30, 2023 and filed for Chapter 11 bankruptcy on August 6,
  2023, ending nearly 100 years of operation. Bankruptcy asset sales
  redistributed terminals and equipment to Saia, XPO, Estes, and other
  carriers; no public developer APIs were ever published.
